<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisobotchi Tizimi - Kirish</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card transform transition-all hover:scale-105">
            <div class="login-header">
                <i class="fas fa-chart-line animate-bounce"></i>
                <h1 class="animate-fade-in-down">Hisobotchi Tizimi</h1>
                <p class="animate-fade-in-down">Tizimga kirishingiz kerak</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group animate-fade-in-up">
                    <label for="username">
                        <i class="fas fa-user transition-transform"></i>
                        Foydalanuvchi nomi
                    </label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Foydalanuvchi nomingizni kiriting"
                           class="transition-all transform hover:-translate-y-1">
                </div>
                
                <div class="form-group animate-fade-in-up">
                    <label for="password">
                        <i class="fas fa-lock transition-transform"></i>
                        Parol
                    </label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Parolingizni kiriting"
                           class="transition-all transform hover:-translate-y-1">
                    <span class="password-toggle transition-all hover:scale-110" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </span>
                </div>
                
                <button type="submit" class="login-btn transition-all transform hover:-translate-y-2 hover:shadow-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Kirish</span>
                </button>
            </form>
            
            <div class="login-footer animate-fade-in">
                <p>&copy; 2024 Hisobotchi Tizimi. Barcha huquqlar himoyalangan.</p>
            </div>
        </div>
    </div>
    
    <!-- Theme Toggle Button -->
    <div class="theme-toggle animate-fade-in" onclick="toggleTheme()" style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <i class="fas fa-sun sun-icon"></i>
        <i class="fas fa-moon moon-icon"></i>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast">
        <span id="toast-message"></span>
        <button id="toast-close">&times;</button>
    </div>
    
    <!-- Loading spinner -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
